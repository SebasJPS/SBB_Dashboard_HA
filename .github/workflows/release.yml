name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate repository
        run: python scripts/ci/validate_repo.py

      - name: Validate tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match VERSION ($FILE_VERSION)"
            exit 1
          fi

      - name: Build release zip
        run: |
          mkdir -p dist
          zip -r "dist/sbb_dashboard_cards.zip" custom_components/sbb_dashboard_cards

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbb_dashboard_cards_zip
          path: dist/sbb_dashboard_cards.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sbb_dashboard_cards.zip
          generate_release_notes: true
